services:
  mongodb:
    image: mongo:7.0
    container_name: leafy-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - leafy-network

  postgresql:
    image: postgres:16-alpine
    container_name: leafy-postgresql
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: leafy_iot_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    networks:
      - leafy-network

  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: leafy-iot-mqtt
    restart: unless-stopped
    ports:
      - "${IOT_MQTT_PORT:-1883}:1883"
    healthcheck:
      test: [ "CMD-SHELL", "mosquitto_sub -h localhost -p 1883 -t '$$SYS/broker/version' -C 1 -W 3 >/dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - leafy-network

  kafka:
    image: apache/kafka:3.7.0
    container_name: leafy-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "29092:29092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
      - ./secrets/your-file.json:/run/secrets/firebase-service-account.json:ro
    networks:
      - leafy-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: leafy-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: leafy-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - leafy-network

  redis:
    image: redis:7-alpine
    container_name: leafy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123
    volumes:
      - redis_data:/data
    networks:
      - leafy-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: leafy-elasticsearch
    restart: unless-stopped
    command: >
      sh -c "if [ ! -d \"plugins/analysis-icu\" ]; then bin/elasticsearch-plugin install --batch analysis-icu; fi &&
             /usr/local/bin/docker-entrypoint.sh elasticsearch"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: leafy-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - leafy-network
    depends_on:
      elasticsearch:
        condition: service_healthy
  qdrant:
    image: qdrant/qdrant:latest
    container_name: leafy-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  fluent-bit:
    image: fluent/fluent-bit:3.2
    container_name: leafy-fluent-bit
    restart: unless-stopped
    ports:
      - "2020:2020"  # Fluent Bit metrics
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log/host:ro
    networks:
      - leafy-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:2020/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================
  # SERVICE REGISTRY
  # ===========================================
  discovery-server:
    build:
      context: ..
      dockerfile: discovery-server/Dockerfile
      args:
        MODULE_NAME: discovery-server
    container_name: discovery-server
    hostname: discovery-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT_DISCOVERY:-8761}:8761"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  config-server:
    build:
      context: ..
      dockerfile: config-server/Dockerfile
      args:
        MODULE_NAME: config-server
    container_name: config-server
    hostname: config-server
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      SERVER_PORT_CONFIG: ${SERVER_PORT_CONFIG:-8888}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://discovery-server:8761/eureka/}
      HOSTNAME: config-server
    ports:
      - "${SERVER_PORT_CONFIG:-8888}:8888"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ===========================================
  # GATEWAY & AUTH
  # ===========================================
  api-gateway:
    build:
      context: ..
      dockerfile: api-gateway/Dockerfile
      args:
        MODULE_NAME: api-gateway
    container_name: api-gateway
    hostname: api-gateway
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SERVER_PORT_GATEWAY: ${SERVER_PORT_GATEWAY:-8060}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://discovery-server:8761/eureka/}
      HOSTNAME: api-gateway
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: redis123
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8081}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
    ports:
      - "${SERVER_PORT_GATEWAY:-8060}:8060"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8060/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  auth-service:
    build:
      context: ..
      dockerfile: auth-service/Dockerfile
      args:
        MODULE_NAME: auth-service
    container_name: auth-service
    hostname: auth-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      profile-service:
        condition: service_healthy
    environment:
      SERVER_PORT_AUTH: ${SERVER_PORT_AUTH:-8081}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      HOSTNAME: auth-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://discovery-server:8761/eureka/}
      SPRING_DATA_MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      SPRING_DATA_MONGODB_PORT: ${MONGODB_PORT:-27017}
      SPRING_DATA_MONGODB_DATABASE: ${MONGODB_DATABASE_AUTH:-leafy_auth}
      SPRING_DATA_MONGODB_USERNAME: ${MONGODB_USERNAME:-admin}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGODB_PASSWORD:-admin123}
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      MONGODB_PORT: ${MONGODB_PORT:-27017}
      MONGODB_DATABASE_AUTH: ${MONGODB_DATABASE_AUTH:-leafy_auth}
      MONGODB_USERNAME: ${MONGODB_USERNAME:-admin}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-admin123}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      SPRING_DATA_REDIS_PASSWORD: ${SPRING_DATA_REDIS_PASSWORD:-redis123}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}
      JWT_REFRESH_WEB_EXPIRATION: ${JWT_REFRESH_WEB_EXPIRATION}
      JWT_REFRESH_MOBILE_EXPIRATION: ${JWT_REFRESH_MOBILE_EXPIRATION}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}

    ports:
      - "${SERVER_PORT_AUTH:-8081}:8081"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 40s

  file-service:
    build:
      context: ..
      dockerfile: file-service/Dockerfile
      args:
        MODULE_NAME: file-service
    container_name: file-service
    hostname: file-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_started
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SERVER_PORT_FILE: ${SERVER_PORT_FILE:-8084}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      HOSTNAME: file-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://discovery-server:8761/eureka/}
      SPRING_DATA_MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      SPRING_DATA_MONGODB_PORT: ${MONGODB_PORT:-27017}
      SPRING_DATA_MONGODB_DATABASE: ${MONGODB_DATABASE_FILE:-leafy_file}
      SPRING_DATA_MONGODB_USERNAME: ${MONGODB_USERNAME:-admin}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGODB_PASSWORD:-admin123}
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      MONGODB_PORT: ${MONGODB_PORT:-27017}
      MONGODB_DATABASE_FILE: ${MONGODB_DATABASE_FILE:-leafy_file}
      MONGODB_USERNAME: ${MONGODB_USERNAME:-admin}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-admin123}
      SPRING_KAFKA_ENABLED: "false"
      SPRING_DATA_REDIS_ENABLED: "false"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET_NAME: ${AWS_S3_BUCKET:-leafy-meida-storage}
    ports:
      - "${SERVER_PORT_FILE:-8084}:8084"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 40s

  profile-service:
    build:
      context: ..
      dockerfile: profile-service/Dockerfile
      args:
        MODULE_NAME: profile-service
    container_name: profile-service
    hostname: profile-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_started
      postgresql:
        condition: service_started
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SERVER_PORT_PROFILE: ${SERVER_PORT_PROFILE:-8083}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      HOSTNAME: profile-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://discovery-server:8761/eureka/}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/leafy_iot_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres123
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_DATA_MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      SPRING_DATA_MONGODB_PORT: ${MONGODB_PORT:-27017}
      SPRING_DATA_MONGODB_DATABASE: ${MONGODB_DATABASE_PROFILE:-leafy_profile}
      SPRING_DATA_MONGODB_USERNAME: ${MONGODB_USERNAME:-admin}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGODB_PASSWORD:-admin123}
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      MONGODB_PORT: ${MONGODB_PORT:-27017}
      MONGODB_DATABASE_PROFILE: ${MONGODB_DATABASE_PROFILE:-leafy_profile}
      MONGODB_USERNAME: ${MONGODB_USERNAME:-admin}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-admin123}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
    ports:
      - "${SERVER_PORT_PROFILE:-8083}:${SERVER_PORT_PROFILE:-8083}"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${SERVER_PORT_PROFILE:-8083}/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ===========================================
  # BUSINESS SERVICES
  # ===========================================
  search-service:
    build:
      context: ..
      dockerfile: search-service/Dockerfile
      args:
        MODULE_NAME: search-service
    container_name: search-service
    hostname: search-service
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SERVER_PORT_SEARCH: ${SERVER_PORT_SEARCH:-8088}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      HOSTNAME: search-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://discovery-server:8761/eureka/}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      ELASTICSEARCH_USERNAME: ${ELASTICSEARCH_USERNAME:-}
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD:-}
      ELASTICSEARCH_SSL: ${ELASTICSEARCH_SSL:-false}
      SPRING_DATA_MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      SPRING_DATA_MONGODB_PORT: ${MONGODB_PORT:-27017}
      SPRING_DATA_MONGODB_DATABASE: ${MONGODB_DATABASE_SEARCH:-leafy_search}
      SPRING_DATA_MONGODB_USERNAME: ${MONGODB_USERNAME:-admin}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGODB_PASSWORD:-admin123}
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      MONGODB_PORT: ${MONGODB_PORT:-27017}
      MONGODB_DATABASE_SEARCH: ${MONGODB_DATABASE_SEARCH:-leafy_search}
      MONGODB_USERNAME: ${MONGODB_USERNAME:-admin}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-admin123}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
    ports:
      - "${SERVER_PORT_SEARCH:-8088}:8088"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8088/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 40s

  notification-service:
    build:
      context: ..
      dockerfile: notification-service/Dockerfile
      args:
        MODULE_NAME: notification-service
    container_name: notification-service
    hostname: notification-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_started
      mongodb:
        condition: service_started
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SERVER_PORT_NOTIFICATION: ${SERVER_PORT_NOTIFICATION:-8095}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      HOSTNAME: notification-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://discovery-server:8761/eureka/}
      SPRING_DATA_MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      SPRING_DATA_MONGODB_PORT: ${MONGODB_PORT:-27017}
      SPRING_DATA_MONGODB_DATABASE: ${MONGODB_DATABASE_NOTIFICATION:-leafy_notification}
      SPRING_DATA_MONGODB_USERNAME: ${MONGODB_USERNAME:-admin}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGODB_PASSWORD:-admin123}
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      MONGODB_PORT: ${MONGODB_PORT:-27017}
      MONGODB_DATABASE_NOTIFICATION: ${MONGODB_DATABASE_NOTIFICATION:-leafy_notification}
      MONGODB_USERNAME: ${MONGODB_USERNAME:-admin}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-admin123}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      SPRING_DATA_REDIS_PASSWORD: ${SPRING_DATA_REDIS_PASSWORD:-redis123}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      NOTIFICATION_EMAIL_ENABLED: ${NOTIFICATION_EMAIL_ENABLED}
      NOTIFICATION_EMAIL_FROM: ${NOTIFICATION_EMAIL_FROM}
      NOTIFICATION_SMS_ENABLED: ${NOTIFICATION_SMS_ENABLED}
      NOTIFICATION_PUSH_ENABLED: ${NOTIFICATION_PUSH_ENABLED}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      FIREBASE_ENABLED: "true"
      FIREBASE_CONFIG_PATH: /run/secrets/firebase-service-account.json
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL}
      BREVO_SENDER_NAME: ${BREVO_SENDER_NAME}
      BREVO_ENABLED: ${BREVO_ENABLED}
    ports:
      - "${SERVER_PORT_NOTIFICATION:-8095}:8095"
    volumes:
      - D:\KLTN\Leafy\Leafy_BE\notification-service\secret\firebase-service-account.json:/run/secrets/firebase-service-account.json:ro
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8095/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 40s

  plant-management-service:
    build:
      context: ..
      dockerfile: plant-management-service/Dockerfile
      args:
        MODULE_NAME: plant-management-service
    container_name: plant-management-service
    hostname: plant-management-service
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_started
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SERVER_PORT_PLANT: ${SERVER_PORT_PLANT:-8085}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      HOSTNAME: plant-management-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://discovery-server:8761/eureka/}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/leafy_iot_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres123
