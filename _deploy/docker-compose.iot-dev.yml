services:
  postgresql:
    image: postgres:16-alpine
    container_name: leafy-iot-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-leafy_iot_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    ports:
      - "${IOT_POSTGRES_PORT:-5432}:5432"
    volumes:
      - iot_postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-leafy_iot_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - leafy-network

  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: leafy-iot-mqtt
    restart: unless-stopped
    ports:
      - "${IOT_MQTT_PORT:-1883}:1883"
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -p 1883 -t '$$SYS/broker/version' -C 1 -W 3 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - leafy-network

  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    container_name: discovery-server
    hostname: discovery-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT_DISCOVERY:-8761}:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - leafy-network

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: config-server
    hostname: config-server
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      SERVER_PORT_CONFIG: ${SERVER_PORT_CONFIG:-8888}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://discovery-server:8761/eureka/}
      HOSTNAME: config-server
    ports:
      - "${SERVER_PORT_CONFIG:-8888}:8888"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - leafy-network

  iot-metrics-collector-service:
    build:
      context: .
      dockerfile: iot-metrics-collector-service/Dockerfile
    container_name: iot-metrics-collector-service
    hostname: iot-metrics-collector-service
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
      mqtt-broker:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SERVER_PORT: ${SERVER_PORT_IOT:-8091}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://discovery-server:8761/eureka/}
      HOSTNAME: iot-metrics-collector-service
      DB_HOST: postgresql
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-leafy_iot_db}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-tcp://137.66.4.201:1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-admin}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-admin}
      MQTT_CLIENT_ID: iot-metrics-collector-service
    ports:
      - "${SERVER_PORT_IOT:-8091}:8091"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8091/iot/alert-events || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 50s
    networks:
      - leafy-network

  iot-test-data-service:
    build:
      context: .
      dockerfile: iot-test-data-service/Dockerfile
    container_name: iot-test-data-service
    hostname: iot-test-data-service
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
      mqtt-broker:
        condition: service_healthy
      iot-metrics-collector-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: ${SERVER_PORT_IOT_TEST_DATA:-8099}
      SEED_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/${DB_NAME:-leafy_iot_db}
      SEED_DATASOURCE_USERNAME: ${DB_USERNAME:-postgres}
      SEED_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres123}
      SEED_COLLECTOR_BASE_URL: ${SEED_COLLECTOR_BASE_URL:-http://iot-metrics-collector-service:8091}
      SEED_MQTT_URL: ${SEED_MQTT_URL:-tcp://137.66.4.201:1883}
      SEED_MQTT_USERNAME: ${SEED_MQTT_USERNAME:-admin}
      SEED_MQTT_PASSWORD: ${SEED_MQTT_PASSWORD:-admin}
      SEED_MQTT_PRODUCT: ${SEED_MQTT_PRODUCT:-coffee}
      SEED_MQTT_ENV: ${SEED_MQTT_ENV:-prod}
    ports:
      - "${SERVER_PORT_IOT_TEST_DATA:-8099}:8099"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8099/seed/simulation/status || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - leafy-network

  fluent-bit:
    image: fluent/fluent-bit:3.2
    container_name: iot-fluent-bit
    restart: unless-stopped
    ports:
      - "2021:2020"  # IoT Fluent Bit metrics (different host port)
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log/host:ro
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:2020/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  leafy-network:
    driver: bridge

volumes:
  iot_postgresql_data:
