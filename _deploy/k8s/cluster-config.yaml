apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
  name: leafy-api
  region: ap-southeast-1

vpc:
  id: "vpc-07c752791c9077097"
  subnets:
    public:
      ap-southeast-1a: { id: "subnet-0c12127a27d85b7f2" }
      ap-southeast-1b: { id: "subnet-0fe3b45ef54c20fae" }
    private:
      ap-southeast-1a: { id: "subnet-042ff62d35a901b21" }
      ap-southeast-1b: { id: "subnet-0aed5dbd6838865cf" }

managedNodeGroups:
  - name: ng-0-messaging
    instanceType: c7i-flex.large
    desiredCapacity: 1
    privateNetworking: true
    labels: { node-type: messaging }

  - name: ng-1-data
    instanceType: m7i-flex.large
    desiredCapacity: 1
    privateNetworking: true
    labels: { node-type: data }

  - name: ng-2-app
    instanceType: m7i-flex.large
    desiredCapacity: 1
    privateNetworking: true
    labels: { node-type: app }

  - name: ng-3-search-ai
    instanceType: m7i-flex.large
    desiredCapacity: 1
    privateNetworking: true
    labels: { node-type: search-ai }