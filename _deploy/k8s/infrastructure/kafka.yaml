apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: leafy-kafka
  namespace: leafy
spec:
  serviceName: leafy-kafka
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      nodeSelector:
        node-type: messaging
      terminationGracePeriodSeconds: 60
      containers:
        - name: kafka
          image: apache/kafka:3.7.0
          ports:
            - containerPort: 9092
              name: kafka-plaintext
            - containerPort: 29092
              name: kafka-internal
            - containerPort: 9093
              name: kafka-controller
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@leafy-kafka:9093
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://leafy-kafka:29092,CONTROLLER://leafy-kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://leafy-kafka:29092,PLAINTEXT_HOST://localhost:9092
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_LOG_DIRS
              value: /var/lib/kafka/data
            - name: CLUSTER_ID
              value: MkU3OEVBNTcwNTJENDM2Qk
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "3000"
            - name: KAFKA_NUM_PARTITIONS
              value: "3"
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 2048Mi
              cpu: 2000m
          readinessProbe:
            exec:
              command: ["kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ebs-gp3-fast
        resources:
          requests:
            storage: 50Gi
