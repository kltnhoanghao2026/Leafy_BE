apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: leafy-elasticsearch
  namespace: leafy
spec:
  serviceName: leafy-elasticsearch
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      securityContext:
        fsGroup: 1000
      nodeSelector:
        node-type: search-ai
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: install-plugins
          image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
          command: ["sh", "-c", "bin/elasticsearch-plugin install --batch analysis-icu"]
          volumeMounts:
            - name: elasticsearch-data
              mountPath: /usr/share/elasticsearch/data
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
          ports:
            - containerPort: 9200
              name: elasticsearch
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: -Xms512m -Xmx512m
            - name: cluster.name
              value: leafy-search-cluster
            - name: node.name
              value: leafy-search-node-1
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 1536Mi
              cpu: 2000m
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: elasticsearch-data
              mountPath: /usr/share/elasticsearch/data
  volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ebs-gp3-fast
        resources:
          requests:
            storage: 50Gi
