apiVersion: apps/v1
kind: Deployment
metadata:
  name: leafy-mqtt-broker
  namespace: leafy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mqtt-broker
  template:
    metadata:
      labels:
        app: mqtt-broker
    spec:
      nodeSelector:
        node-type: messaging
      containers:
        - name: mqtt-broker
          image: eclipse-mosquitto:2
          ports:
            - containerPort: 1883
              name: mqtt
            - containerPort: 9001
              name: mqtt-websocket
          args:
            - /mosquitto/config/mosquitto.conf
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
          readinessProbe:
            tcpSocket:
              port: 1883
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 1883
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: mqtt-config
              mountPath: /mosquitto/config
            - name: mqtt-data
              mountPath: /mosquitto/data
            - name: mqtt-logs
              mountPath: /mosquitto/log
      volumes:
        - name: mqtt-config
          configMap:
            name: mqtt-config
        - name: mqtt-data
          persistentVolumeClaim:
            claimName: mqtt-data-pvc
        - name: mqtt-logs
          persistentVolumeClaim:
            claimName: mqtt-logs-pvc
