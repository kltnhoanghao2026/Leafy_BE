apiVersion: v1
kind: Service
metadata:
  name: leafy-postgresql
  namespace: leafy
spec:
  ports:
    - port: 5432
      targetPort: 5432
      name: postgresql
  selector:
    app: postgresql
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: leafy-postgresql-external
  namespace: leafy
  labels:
    app: postgresql
spec:
  type: LoadBalancer
  loadBalancerSourceRanges:
    - 0.0.0.0/0
  ports:
    - port: 5432
      targetPort: 5432
      name: postgresql
  selector:
    app: postgresql
