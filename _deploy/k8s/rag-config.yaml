apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-config
  namespace: leafy
data:
  # Service Identity
  APP_NAME: rag-service
  SERVICE_NAME: RAG Service
  HOSTNAME: leafy-rag-service

  # Eureka Client
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://leafy-discovery-server:8761/eureka/"
  EUREKA_CLIENT_FETCH_REGISTRY: "true"
  EUREKA_CLIENT_REGISTER_WITH_EUREKA: "true"
  EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"

  # Service Port
  SERVER_PORT: "8199"

  # Document Ingestion
  UNSTRUCTURED_STRATEGY: fast
  CHUNK_SIZE: "1000"
  CHUNK_OVERLAP: "200"
  MARKDOWN_CHUNK_SIZE: "2000"
  MARKDOWN_CHUNK_OVERLAP: "300"

  # AI / LLM Model Selection
  CHAT_MODEL: gpt-4o-mini
  FAST_MODEL: gpt-4o-mini
  DEEP_MODEL: gpt-4o
  RERANKER_MODEL: cross-encoder/ms-marco-MiniLM-L-6-v2
  CONFIDENCE_THRESHOLD: "0.6"
  COMPLETENESS_THRESHOLD: "0.6"
  MAX_REFINEMENT_ATTEMPTS: "5"

  # Environment
  ENV_STATE: prod

  # API Gateway (used by plant_management_client for plan sync)
  API_GATEWAY_URL: "http://leafy-api-gateway:8060"
