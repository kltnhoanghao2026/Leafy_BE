apiVersion: v1
kind: Secret
metadata:
  name: leafy-common-secrets
  namespace: leafy
type: Opaque
stringData:
  MONGODB_USERNAME: admin
  MONGODB_PASSWORD: REPLACE_WITH_REAL_PASSWORD
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: REPLACE_WITH_REAL_PASSWORD
  POSTGRES_DB: bondhub
  REDIS_PASSWORD: REPLACE_WITH_REAL_PASSWORD
  JWT_SECRET: REPLACE_WITH_REAL_JWT_SECRET_MIN_256_BITS
  JWT_ACCESS_EXPIRATION: "3600000"
  JWT_REFRESH_WEB_EXPIRATION: "604800000"
  JWT_REFRESH_MOBILE_EXPIRATION: "2592000000"
  AWS_ACCESS_KEY_ID: REPLACE_WITH_REAL_AWS_KEY
  AWS_SECRET_ACCESS_KEY: REPLACE_WITH_REAL_AWS_SECRET
  AWS_REGION: ap-southeast-1
  AWS_S3_BUCKET: bondhub-files
  KAFKA_BOOTSTRAP_SERVERS: leafy-kafka:9092
  MQTT_BROKER_HOST: leafy-mqtt-broker
  MQTT_BROKER_URL: mqtt://leafy-mqtt-broker:1883
  ELASTICSEARCH_URL: http://leafy-elasticsearch:9200
  ELASTICSEARCH_USERNAME: elastic
  ELASTICSEARCH_PASSWORD: REPLACE_WITH_REAL_ES_PASSWORD
  ELASTICSEARCH_SSL: "false"
  QDRANT_URL: http://leafy-qdrant:6333
  QDRANT_API_KEY: REPLACE_WITH_REAL_QDRANT_API_KEY
  OPENAI_API_KEY: REPLACE_WITH_REAL_OPENAI_KEY
  GOOGLE_API_KEY: REPLACE_WITH_REAL_GOOGLE_API_KEY
  TAVILY_API_KEY: REPLACE_WITH_REAL_TAVILY_KEY
  BREVO_API_KEY: REPLACE_WITH_REAL_BREVO_KEY
  BREVO_SENDER_EMAIL: REPLACE_WITH_REAL_BREVO_EMAIL
  BREVO_SENDER_NAME: BondHub
  BREVO_ENABLED: "false"
  NOTIFICATION_EMAIL_ENABLED: "true"
  NOTIFICATION_EMAIL_FROM: REPLACE_WITH_REAL_EMAIL
  NOTIFICATION_SMS_ENABLED: "false"
  NOTIFICATION_PUSH_ENABLED: "true"
  IOT_ALERT_TRIGGERED_TOPIC: iot.alert.triggered
  MONGODB_DATABASE_AUTH: auth_db
  MONGODB_DATABASE_PROFILE: profile_db
  MONGODB_DATABASE_FILE: file_db
  MONGODB_DATABASE_SEARCH: search_db
  MONGODB_DATABASE_NOTIFICATION: notification_db
  MONGODB_DATABASE_PLANT: plant_db
  MONGODB_DATABASE_SOCKET: socket_db
  MONGODB_DATABASE_MESSAGES: messages_db
  MONGODB_DATABASE_RAG: rag_db
  MONGODB_DATABASE_DISEASE: disease_db
  SPRING_JPA_HIBERNATE_DDL_AUTO: update
  UNSTRUCTURED_STRATEGY: fast
  CHUNK_SIZE: "1000"
  CHUNK_OVERLAP: "200"
  MARKDOWN_CHUNK_SIZE: "2000"
  MARKDOWN_CHUNK_OVERLAP: "300"
  LANGCHAIN_TRACING_V2: "false"
  CHAT_MODEL: gpt-4o-mini
  FAST_MODEL: gpt-4o-mini
  DEEP_MODEL: gpt-4o
  RERANKER_MODEL: cross-encoder/ms-marco-MiniLM-L-6-v2
  CONFIDENCE_THRESHOLD: "0.6"
  COMPLETENESS_THRESHOLD: "0.6"
  MAX_REFINEMENT_ATTEMPTS: "5"
  MODEL_NAME: Coffee-MobileNetV2
  MODEL_PATH: weights/coffee_mobilenetv2_prod_final.keras
  MODEL_TOP_K: "3"
  YOLO_MODEL_PATH: weights/yolo/best.pt
  LOG_LEVEL: INFO
  TF_CPP_MIN_LOG_LEVEL: "2"
  ENV_STATE: dev
---
apiVersion: v1
kind: Secret
metadata:
  name: leafy-db-secrets
  namespace: leafy
type: Opaque
stringData:
  mongodb-admin-username: admin
  mongodb-admin-password: REPLACE_WITH_REAL_PASSWORD
  postgresql-username: postgres
  postgresql-password: REPLACE_WITH_REAL_PASSWORD
  postgresql-database: bondhub
  redis-password: REPLACE_WITH_REAL_PASSWORD
