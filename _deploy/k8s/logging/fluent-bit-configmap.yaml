apiVersion: v1
kind: ConfigMap
metadata:
  name: leafy-fluent-bit-config
  namespace: leafy
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
        Health_Check  On

    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Parser            docker
        Tag               kube.*
        Refresh_Interval  5
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        DB                /var/log/flb_kube.db

    [INPUT]
        Name              tail
        Path              /var/log/pods/*/*/*.log
        Parser            kubernetes
        Tag               kube.*
        Refresh_Interval  5
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_processed
        K8S-Logging.Parser  On
        K8S-Logging.Exclude  On
        Labels              On
        Annotations         Off

    [FILTER]
        Name          modify
        Match         kube.*
        Add           cluster leafy-cluster
        Add           environment prod

    [FILTER]
        Name          lua
        Match         kube.*
        Script        /fluent-bit/etc/add-log-fields.lua
        Call          add_fields

    [OUTPUT]
        Name            es
        Match           kube.*
        Host            ${FLUENT_ELASTICSEARCH_HOST}
        Port            9200
        HTTP_User       ${FLUENT_ELASTICSEARCH_USERNAME}
        HTTP_Passwd     ${FLUENT_ELASTICSEARCH_PASSWORD}
        Logstash_Format On
        Logstash_Prefix leafy-logs
        Retry_Limit     False
        Replace_Dots    On
        Suppress_Type_Name On
        tls             Off
        tls.verify      Off
        Buffer_Size     10MB
        # Suppress repetitive logs from the same pod
        dedot           On

  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On

    [PARSER]
        Name        kubernetes
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On
        # Spring Boot JSON log fields
        Decode_Field_as  escaped_utf8    log    do_next
        Decode_Field_as  json    log
        Decode_Field_as  json    log_processed
        Keep_Log         On
        K8S-Logging.Parser On
        K8S-Logging.Exclude On

    [PARSER]
        Name        json
        Format      json
        Time_Key    @timestamp
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ

    [PARSER]
        Name        syslog
        Format      regex
        Regex       ^\<(?<pri>[0-9]+)\>(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[^ :\[\\]]+)(?:\[(?<pid>[0-9]+)\])?[^\:]*\: *(?<message>.*)$
        Time_Key    time
        Time_Format %b %d %H:%M:%S
        Time_Keep   On

  add-log-fields.lua: |
    function add_fields(tag, timestamp, record)
        if record == nil then
            return 0, timestamp, {}
        end

        -- Extract app name from kubernetes metadata
        local kubernetes = record["kubernetes"]
        if kubernetes then
            local labels = kubernetes["labels"]
            if labels then
                local app = labels["app"]
                if app then
                    record["application"] = app
                end
            end
        end

        -- If no application field, try pod name prefix
        if not record["application"] then
            local pod = kubernetes and kubernetes["pod_name"]
            if pod then
                local parts = {}
                for part in string.gmatch(pod, "[^-]+") do
                    table.insert(parts, part)
                end
                if #parts > 0 then
                    record["application"] = parts[1]
                end
            end
        end

        -- Add severity from log level if present in log field
        local log_str = record["log"]
        if log_str and type(log_str) == "string" then
            if string.find(log_str, "ERROR") then
                record["level"] = "error"
            elseif string.find(log_str, "WARN") then
                record["level"] = "warn"
            elseif string.find(log_str, "DEBUG") then
                record["level"] = "debug"
            elseif string.find(log_str, "TRACE") then
                record["level"] = "trace"
            else
                record["level"] = "info"
            end
        end

        return 1, timestamp, record
    end
