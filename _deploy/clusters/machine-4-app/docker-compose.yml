services:
  # =========================================
  # APP TIER - Machine 4 (Bastion / Application)
  # =========================================

  # --- Infrastructure Services ---
  discovery-server:
    image: ${ECR_REGISTRY}/discovery-server:${IMAGE_TAG}
    container_name: discovery-server
    hostname: discovery-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT_DISCOVERY:-8761}:8761"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 256M

  config-server:
    image: ${ECR_REGISTRY}/config-server:${IMAGE_TAG}
    container_name: config-server
    hostname: config-server
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      SERVER_PORT_CONFIG: ${SERVER_PORT_CONFIG:-8888}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      HOSTNAME: config-server
    ports:
      - "${SERVER_PORT_CONFIG:-8888}:8888"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 256M

  # --- Gateway & Auth ---
  api-gateway:
    image: ${ECR_REGISTRY}/api-gateway:${IMAGE_TAG}
    container_name: api-gateway
    hostname: api-gateway
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SERVER_PORT_GATEWAY: ${SERVER_PORT_GATEWAY:-8060}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      HOSTNAME: api-gateway
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      AUTH_SERVICE_URL: http://auth-service:8081
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    ports:
      - "${SERVER_PORT_GATEWAY:-8060}:8060"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8060/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M

  auth-service:
    image: ${ECR_REGISTRY}/auth-service:${IMAGE_TAG}
    container_name: auth-service
    hostname: auth-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SERVER_PORT_AUTH: ${SERVER_PORT_AUTH:-8081}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI}
      HOSTNAME: auth-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      SPRING_DATA_MONGODB_HOST: ${MONGODB_HOST}
      SPRING_DATA_MONGODB_PORT: ${MONGODB_PORT:-27017}
      SPRING_DATA_MONGODB_DATABASE: ${MONGODB_DATABASE_AUTH}
      SPRING_DATA_MONGODB_USERNAME: ${MONGODB_USERNAME}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}
      JWT_REFRESH_WEB_EXPIRATION: ${JWT_REFRESH_WEB_EXPIRATION}
      JWT_REFRESH_MOBILE_EXPIRATION: ${JWT_REFRESH_MOBILE_EXPIRATION}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    ports:
      - "${SERVER_PORT_AUTH:-8081}:8081"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M

  # --- Business Services ---
  profile-service:
    image: ${ECR_REGISTRY}/profile-service:${IMAGE_TAG}
    container_name: profile-service
    hostname: profile-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      postgresql:
        condition: service_started
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SERVER_PORT_PROFILE: ${SERVER_PORT_PROFILE:-8083}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI}
      HOSTNAME: profile-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST}:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_DATA_MONGODB_HOST: ${MONGODB_HOST}
      SPRING_DATA_MONGODB_PORT: ${MONGODB_PORT:-27017}
      SPRING_DATA_MONGODB_DATABASE: ${MONGODB_DATABASE_PROFILE}
      SPRING_DATA_MONGODB_USERNAME: ${MONGODB_USERNAME}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    ports:
      - "${SERVER_PORT_PROFILE:-8083}:${SERVER_PORT_PROFILE:-8083}"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M

  file-service:
    image: ${ECR_REGISTRY}/file-service:${IMAGE_TAG}
    container_name: file-service
    hostname: file-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SERVER_PORT_FILE: ${SERVER_PORT_FILE:-8084}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI}
      HOSTNAME: file-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      SPRING_DATA_MONGODB_HOST: ${MONGODB_HOST}
      SPRING_DATA_MONGODB_PORT: ${MONGODB_PORT:-27017}
      SPRING_DATA_MONGODB_DATABASE: ${MONGODB_DATABASE_FILE}
      SPRING_DATA_MONGODB_USERNAME: ${MONGODB_USERNAME}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET_NAME: ${AWS_S3_BUCKET}
    ports:
      - "${SERVER_PORT_FILE:-8084}:8084"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M

  search-service:
    image: ${ECR_REGISTRY}/search-service:${IMAGE_TAG}
    container_name: search-service
    hostname: search-service
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SERVER_PORT_SEARCH: ${SERVER_PORT_SEARCH:-8088}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI}
      HOSTNAME: search-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      ELASTICSEARCH_USERNAME: ${ELASTICSEARCH_USERNAME}
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD}
      ELASTICSEARCH_SSL: ${ELASTICSEARCH_SSL:-false}
      SPRING_DATA_MONGODB_HOST: ${MONGODB_HOST}
      SPRING_DATA_MONGODB_PORT: ${MONGODB_PORT:-27017}
      SPRING_DATA_MONGODB_DATABASE: ${MONGODB_DATABASE_SEARCH}
      SPRING_DATA_MONGODB_USERNAME: ${MONGODB_USERNAME}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    ports:
      - "${SERVER_PORT_SEARCH:-8088}:8088"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8088/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M

  notification-service:
    image: ${ECR_REGISTRY}/notification-service:${IMAGE_TAG}
    container_name: notification-service
    hostname: notification-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_started
      mongodb:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SERVER_PORT_NOTIFICATION: ${SERVER_PORT_NOTIFICATION:-8095}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI}
      HOSTNAME: notification-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      SPRING_DATA_MONGODB_HOST: ${MONGODB_HOST}
      SPRING_DATA_MONGODB_PORT: ${MONGODB_PORT:-27017}
      SPRING_DATA_MONGODB_DATABASE: ${MONGODB_DATABASE_NOTIFICATION}
      SPRING_DATA_MONGODB_USERNAME: ${MONGODB_USERNAME}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      NOTIFICATION_EMAIL_ENABLED: ${NOTIFICATION_EMAIL_ENABLED}
      NOTIFICATION_EMAIL_FROM: ${NOTIFICATION_EMAIL_FROM}
      NOTIFICATION_SMS_ENABLED: ${NOTIFICATION_SMS_ENABLED}
      NOTIFICATION_PUSH_ENABLED: ${NOTIFICATION_PUSH_ENABLED}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      FIREBASE_ENABLED: "true"
      FIREBASE_CONFIG_PATH: /run/secrets/firebase-service-account.json
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL}
      BREVO_SENDER_NAME: ${BREVO_SENDER_NAME}
      BREVO_ENABLED: ${BREVO_ENABLED}
    ports:
      - "${SERVER_PORT_NOTIFICATION:-8095}:8095"
    volumes:
      - ${FIREBASE_CREDENTIALS_PATH}:/run/secrets/firebase-service-account.json:ro
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8095/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M

  plant-management-service:
    image: ${ECR_REGISTRY}/plant-management-service:${IMAGE_TAG}
    container_name: plant-management-service
    hostname: plant-management-service
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_started
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SERVER_PORT_PLANT: ${SERVER_PORT_PLANT:-8085}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI}
      HOSTNAME: plant-management-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST}:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_DATA_MONGODB_HOST: ${MONGODB_HOST}
      SPRING_DATA_MONGODB_PORT: ${MONGODB_PORT:-27017}
      SPRING_DATA_MONGODB_DATABASE: ${MONGODB_DATABASE_PLANT}
      SPRING_DATA_MONGODB_USERNAME: ${MONGODB_USERNAME}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    ports:
      - "${SERVER_PORT_PLANT:-8085}:8085"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8085/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M

  # --- IoT Services ---
  iot-metrics-collector-service:
    image: ${ECR_REGISTRY}/iot-metrics-collector-service:${IMAGE_TAG}
    container_name: iot-metrics-collector-service
    hostname: iot-metrics-collector-service
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_started
      kafka:
        condition: service_started
      mqtt-broker:
        condition: service_started
      redis:
        condition: service_started
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SERVER_PORT_IOT_METRICS: ${SERVER_PORT_IOT_METRICS:-8087}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI}
      HOSTNAME: iot-metrics-collector-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST}:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      IOT_MQTT_HOST: ${MQTT_BROKER_HOST}
      IOT_MQTT_PORT: ${IOT_MQTT_PORT:-1883}
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
      IOT_ALERT_TRIGGERED_TOPIC: ${IOT_ALERT_TRIGGERED_TOPIC:-iot.alert.triggered}
      FILE_SERVICE_UPLOAD_URL: http://file-service:8084/files/upload
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "${SERVER_PORT_IOT_METRICS:-8087}:8087"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8087/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M

  # --- Community & Chat ---
  community-feed-service:
    image: ${ECR_REGISTRY}/community-feed-service:${IMAGE_TAG}
    container_name: community-feed-service
    hostname: community-feed-service
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_started
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SERVER_PORT_COMMUNITY: ${SERVER_PORT_COMMUNITY_FEED:-8090}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI}
      HOSTNAME: community-feed-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST}:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_DATA_MONGODB_HOST: ${MONGODB_HOST}
      SPRING_DATA_MONGODB_PORT: ${MONGODB_PORT:-27017}
      SPRING_DATA_MONGODB_DATABASE: ${MONGODB_DATABASE_COMMUNITY_FEED}
      SPRING_DATA_MONGODB_USERNAME: ${MONGODB_USERNAME}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    ports:
      - "${SERVER_PORT_COMMUNITY_FEED:-8090}:8090"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8090/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M

  socket-service:
    image: ${ECR_REGISTRY}/socket-service:${IMAGE_TAG}
    container_name: socket-service
    hostname: socket-service
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SERVER_PORT_SOCKET: ${SERVER_PORT_SOCKET:-8093}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI}
      HOSTNAME: socket-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      SPRING_DATA_MONGODB_HOST: ${MONGODB_HOST}
      SPRING_DATA_MONGODB_PORT: ${MONGODB_PORT:-27017}
      SPRING_DATA_MONGODB_DATABASE: ${MONGODB_DATABASE_SOCKET}
      SPRING_DATA_MONGODB_USERNAME: ${MONGODB_USERNAME}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}
      JWT_REFRESH_WEB_EXPIRATION: ${JWT_REFRESH_WEB_EXPIRATION}
      JWT_REFRESH_MOBILE_EXPIRATION: ${JWT_REFRESH_MOBILE_EXPIRATION}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    ports:
      - "${SERVER_PORT_SOCKET:-8093}:8093"
    networks:
      - leafy-network
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M

  message-service:
    image: ${ECR_REGISTRY}/message-service:${IMAGE_TAG}
    container_name: message-service
    hostname: message-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
      socket-service:
        condition: service_started
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SERVER_PORT_MESSAGE: ${SERVER_PORT_MESSAGES:-8092}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI}
      HOSTNAME: message-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      SPRING_DATA_MONGODB_HOST: ${MONGODB_HOST}
      SPRING_DATA_MONGODB_PORT: ${MONGODB_PORT:-27017}
      SPRING_DATA_MONGODB_DATABASE: ${MONGODB_DATABASE_MESSAGES}
      SPRING_DATA_MONGODB_USERNAME: ${MONGODB_USERNAME}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SOCKET_SERVICE_URL: http://socket-service:8093
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    ports:
      - "${SERVER_PORT_MESSAGES:-8092}:8092"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8092/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M

  # --- AI Services ---
  rag-service:
    image: ${ECR_REGISTRY}/rag-service:${IMAGE_TAG}
    container_name: rag-service
    hostname: rag-service
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_started
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SERVER_PORT: ${SERVER_PORT_RAG:-8199}
      SPRING_APPLICATION_NAME: rag-service
      HOSTNAME: rag-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      API_GATEWAY_URL: http://api-gateway:8060
      MONGODB_HOST: ${MONGODB_HOST}
      MONGODB_PORT: 27017
      MONGODB_USERNAME: ${MONGODB_USERNAME}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      MONGODB_DATABASE_RAG: ${MONGODB_DATABASE_RAG}
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      FILE_SERVICE_URL: http://file-service:8084
      UNSTRUCTURED_STRATEGY: ${UNSTRUCTURED_STRATEGY:-fast}
      CHUNK_SIZE: ${CHUNK_SIZE:-1000}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-200}
      MARKDOWN_CHUNK_SIZE: ${MARKDOWN_CHUNK_SIZE:-2000}
      MARKDOWN_CHUNK_OVERLAP: ${MARKDOWN_CHUNK_OVERLAP:-300}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_PROJECT: rag-service
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      CHAT_MODEL: ${CHAT_MODEL:-gpt-4o-mini}
      FAST_MODEL: ${FAST_MODEL:-gpt-4o-mini}
      DEEP_MODEL: ${DEEP_MODEL:-gpt-4o}
      RERANKER_MODEL: ${RERANKER_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.6}
      COMPLETENESS_THRESHOLD: ${COMPLETENESS_THRESHOLD:-0.6}
      MAX_REFINEMENT_ATTEMPTS: ${MAX_REFINEMENT_ATTEMPTS:-5}
    ports:
      - "${SERVER_PORT_RAG:-8199}:8199"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8199/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 4096M
        reservations:
          memory: 1024M
        limits:
          cpus: 2

  disease-detection-service:
    image: ${ECR_REGISTRY}/disease-detection-service:${IMAGE_TAG}
    container_name: disease-detection-service
    hostname: disease-detection-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      PORT: ${SERVER_PORT_DISEASE:-8096}
      SPRING_APPLICATION_NAME: disease-detection-service
      HOSTNAME: disease-detection-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      SERVICE_NAME: ${SERVICE_NAME:-Disease Detection Service}
      MODEL_NAME: ${MODEL_NAME:-Coffee-MobileNetV2}
      MODEL_PATH: ${MODEL_PATH:-weights/coffee_mobilenetv2_prod_final.keras}
      MODEL_TOP_K: ${MODEL_TOP_K:-3}
      YOLO_MODEL_PATH: ${YOLO_MODEL_PATH:-weights/yolo/best.pt}
      FILE_SERVICE_URL: http://file-service:8084
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TF_CPP_MIN_LOG_LEVEL: ${TF_CPP_MIN_LOG_LEVEL:-2}
      MONGODB_HOST: ${MONGODB_HOST}
      MONGODB_PORT: 27017
      MONGODB_USERNAME: ${MONGODB_USERNAME}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      MONGODB_DATABASE_DISEASE: ${MONGODB_DATABASE_DISEASE}
      ENV_STATE: ${ENV_STATE:-dev}
    ports:
      - "${SERVER_PORT_DISEASE:-8096}:8096"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8096/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4096M
        reservations:
          memory: 2048M
        limits:
          cpus: 2

networks:
  leafy-network:
    driver: bridge
