spring:
  application:
    name: file-service
  config:
    import: configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
  cloud:
    config:
      uri: ${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
      fail-fast: false
      retry:
        max-attempts: 10
        initial-interval: 1000
        max-interval: 10000
        multiplier: 2.0
      request-connect-timeout: 5000
      request-read-timeout: 10000
  kafka:
    enabled: false
    bootstrap-servers: ""
  data:
    redis:
      repositories:
        enabled: false

server:
  port: ${SERVER_PORT_FILE:-8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    defaults:
      enabled: true
    livenessState:
      enabled: true
    readinessState:
      enabled: true
