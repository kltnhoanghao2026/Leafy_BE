spring:
  application:
    name: file-service
  config:
    import: optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
  cloud:
    config:
      uri: ${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
      fail-fast: false
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
  kafka:
    enabled: false
    bootstrap-servers: ""
  data:
    redis:
      repositories:
        enabled: false

server:
  port: ${SERVER_PORT_FILE:-8084}

management:
  server:
    port: ${SERVER_PORT_FILE:-8084}
  health:
    defaults:
      enabled: false
