apiVersion: apps/v1
kind: Deployment
metadata:
  name: leafy-file-service
  namespace: leafy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: file-service
  template:
    metadata:
      labels:
        app: file-service
    spec:
      nodeSelector:
        node-type: app
      containers:
        - name: file-service
          image: 383704034208.dkr.ecr.ap-southeast-1.amazonaws.com/leafy/file-service:latest
          imagePullPolicy: Always
          env:
            - name: MONGODB_DATABASE_FILE
              valueFrom:
                secretKeyRef:
                  name: leafy-db-secrets
                  key: MONGODB_DATABASE_FILE
          envFrom:
            - configMapRef:
                name: leafy-common-config
            - secretRef:
                name: leafy-common-secrets
          ports:
            - containerPort: 8084
          resources:
            requests:
              memory: 512Mi
              cpu: 300m
            limits:
              memory: 1536Mi
              cpu: 1000m
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
