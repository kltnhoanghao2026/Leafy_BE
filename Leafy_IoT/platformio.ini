; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32cam

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
build_flags = 
	-std=gnu++17
	-D LEAFY_FIRMWARE_VERSION=\"leafy-esp32-0.1.0\"
	-D LEAFY_DEFAULT_DEVICE_UID=\"leafy-prototype-001\"
	-D LEAFY_DEFAULT_DEVICE_CODE=\"LEAFY-PROTO-001\"
	-D LEAFY_DEFAULT_MQTT_HOST=\"192.168.1.10\"
	-D LEAFY_DEFAULT_WIFI_SSID=\"\"
	-D LEAFY_DEFAULT_WIFI_PASSWORD=\"\"
	-D LEAFY_DHT_PIN=4
	-D LEAFY_SOIL_ADC_PIN=34
	-D LEAFY_SOIL_POWER_PIN=26
	-D LEAFY_LDR_ADC_PIN=35
	-D LEAFY_ANALOG_MAX=4095
	-D LEAFY_SOIL_DRY_RAW=3200
	-D LEAFY_SOIL_WET_RAW=1200
	-D LEAFY_LIGHT_DARK_RAW=3500
	-D LEAFY_LIGHT_BRIGHT_RAW=500
	-D LEAFY_CALIBRATION_LOGGING=0
	-D LEAFY_CALIBRATION_LOG_INTERVAL_SEC=30
lib_deps = 
	bblanchon/ArduinoJson@^7.0.0
	knolleary/PubSubClient@^2.8
	adafruit/DHT sensor library@^1.4.6
	adafruit/Adafruit Unified Sensor@^1.1.14

[env:esp32dev]
board = esp32dev
lib_deps = 
	adafruit/Adafruit Unified Sensor@^1.1.15
	adafruit/DHT sensor library@^1.4.7
	espressif/esp32-camera@^2.0.4
	bblanchon/ArduinoJson@^7.2.2
	knolleary/PubSubClient@^2.8
	tzapu/WiFiManager@^2.0.17

[env:esp32cam]
board = esp32cam
build_flags = 
	${env.build_flags}
	-D LEAFY_ESP32_CAM=1
lib_deps = 
	adafruit/Adafruit Unified Sensor@^1.1.15
	adafruit/DHT sensor library@^1.4.7
	espressif/esp32-camera@^2.0.4
	bblanchon/ArduinoJson@^7.2.2
	knolleary/PubSubClient@^2.8
	tzapu/WiFiManager@^2.0.17
