apiVersion: apps/v1
kind: Deployment
metadata:
  name: leafy-search-service
  namespace: leafy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      nodeSelector:
        node-type: search-ai
      initContainers:
        - name: wait-for-infra
          image: busybox
          command:
            - sh
            - -c
            - |
              until wget -qO- http://leafy-discovery-server:8761/actuator/health/readiness 2>/dev/null | grep -q '"status":"UP"'; do
                echo "Waiting for discovery-server..."
                sleep 5
              done
              until wget -qO- http://leafy-config-server:8888/actuator/health/readiness 2>/dev/null | grep -q '"status":"UP"'; do
                echo "Waiting for config-server..."
                sleep 5
              done
              echo "Infrastructure services are UP"
      containers:
        - name: search-service
          image: ${ECR_REGISTRY}/leafy-search-service:${IMAGE_TAG}
          env:
            - name: IMAGE_TAG
              value: latest
            - name: MONGODB_DATABASE_SEARCH
              valueFrom:
                secretKeyRef:
                  name: leafy-db-secrets
                  key: MONGODB_DATABASE_SEARCH
          envFrom:
            - configMapRef:
                name: leafy-common-config
            - secretRef:
                name: leafy-common-secrets
          ports:
            - containerPort: 8088
          resources:
            requests:
              memory: 512Mi
              cpu: 300m
            limits:
              memory: 1536Mi
              cpu: 1000m
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8088
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8088
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 3
