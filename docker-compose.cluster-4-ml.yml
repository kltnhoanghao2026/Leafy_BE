# ===========================================
# CLUSTER 4: ML & Observability
# EC2 Instance: ec2-ml (Machine Learning & Monitoring)
# ===========================================
# Services: Kafka, Elasticsearch, Qdrant, Fluent Bit, Jenkins
# Ports exposed: 9092, 9200, 5601, 6333, 8080

services:
  # ===========================================
  # MESSAGE QUEUE
  # ===========================================
  kafka:
    image: apache/kafka:3.7.0
    container_name: leafy-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "29092:29092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_BOOTSTRAP_SERVERS: localhost:29092
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: leafy-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: leafy-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - leafy-network

  # ===========================================
  # SEARCH & VECTOR DB
  # ===========================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: leafy-elasticsearch
    restart: unless-stopped
    command: >
      sh -c "if [ ! -d \"plugins/analysis-icu\" ]; then bin/elasticsearch-plugin install --batch analysis-icu; fi &&
             /usr/local/bin/docker-entrypoint.sh elasticsearch"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: leafy-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - leafy-network
    depends_on:
      elasticsearch:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:latest
    container_name: leafy-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # LOGGING & OBSERVABILITY
  # ===========================================
  fluent-bit:
    image: fluent/fluent-bit:3.2
    container_name: leafy-fluent-bit
    restart: unless-stopped
    ports:
      - "2020:2020"
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log/host:ro
    networks:
      - leafy-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:2020/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================
  # CI/CD - JENKINS
  # ===========================================
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: leafy-jenkins
    restart: unless-stopped
    environment:
      JENKINS_OPTS: "--prefix=/jenkins"
      JENKINS_SLAVE_AGENT_PORT: 50000
      DOCKER_HOST: tcp://docker:2376
      DOCKER_TLS_CERTS_DIR: /certs/client
    privileged: true
    user: root
    ports:
      - "${JENKINS_PORT:-8082}:8080"
      - "${JENKINS_AGENT_PORT:-50000}:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - jenkins_docker_certs:/certs/client:ro
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  docker-dind:
    image: docker:24-dind
    container_name: leafy-docker-dind
    restart: unless-stopped
    privileged: true
    environment:
      DOCKER_TLS_CERTS_DIR: /certs/client
      DOCKER_DRIVER: overlay2
    volumes:
      - jenkins_docker_certs:/certs/client
      - jenkins_docker_data:/var/lib/docker
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "docker info || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ===========================================
  # PYTHON / ML SERVICES
  # ===========================================
  rag-service:
    image: ${DOCKER_REGISTRY:-leafy-registry}/rag-service:${IMAGE_TAG:-latest}
    container_name: rag-service
    hostname: rag-service
    restart: unless-stopped
    environment:
      QDRANT_HOST: qdrant
      QDRANT_GRPC_PORT: 6334
      MONGODB_URI: mongodb://admin:admin123@${MONGODB_HOST:-mongodb}:27017
      MONGODB_DATABASE: leafy_rag
      EUREKA_SERVER: http://${DISCOVERY_HOST:-discovery-server}:8761/eureka/
      SERVER_PORT: 8199
    ports:
      - "${SERVER_PORT_RAG:-8199}:8199"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8199/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  disease-detection-service:
    image: ${DOCKER_REGISTRY:-leafy-registry}/disease-detection-service:${IMAGE_TAG:-latest}
    container_name: disease-detection-service
    hostname: disease-detection-service
    restart: unless-stopped
    environment:
      EUREKA_SERVER: http://${DISCOVERY_HOST:-discovery-server}:8761/eureka/
      SERVER_PORT: 8000
    ports:
      - "${SERVER_PORT_DISEASE:-8000}:8000"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

networks:
  leafy-network:
    name: leafy-network
    external: true
    driver: bridge

volumes:
  kafka_data:
    driver: local
  elasticsearch_data:
    driver: local
  qdrant_data:
    driver: local
  jenkins_home:
    driver: local
  jenkins_docker_certs:
    driver: local
  jenkins_docker_data:
    driver: local
