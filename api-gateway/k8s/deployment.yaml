apiVersion: apps/v1
kind: Deployment
metadata:
  name: leafy-api-gateway
  namespace: leafy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      nodeSelector:
        node-type: app
      initContainers:
        - name: wait-for-infra
          image: busybox
          command:
            - sh
            - -c
            - |
              until wget -qO- http://leafy-discovery-server:8761/actuator/health/readiness 2>/dev/null | grep -q '"status":"UP"'; do
                echo "Waiting for discovery-server..."
                sleep 5
              done
              until wget -qO- http://leafy-config-server:8888/actuator/health/readiness 2>/dev/null | grep -q '"status":"UP"'; do
                echo "Waiting for config-server..."
                sleep 5
              done
              echo "Infrastructure services are UP"
      containers:
        - name: api-gateway
          image: ${ECR_REGISTRY}/leafy-api-gateway:${IMAGE_TAG}
          ports:
            - containerPort: 8060
          envFrom:
            - configMapRef:
                name: leafy-common-config
            - secretRef:
                name: leafy-common-secrets
          resources:
            requests:
              memory: 512Mi
              cpu: 300m
            limits:
              memory: 1536Mi
              cpu: 1000m
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8060
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8060
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 3
