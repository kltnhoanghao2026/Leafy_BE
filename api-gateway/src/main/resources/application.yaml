spring:
  application:
    name: api-gateway
  messages:
    basename: i18n/messages,i18n/gateway-messages
    encoding: UTF-8
  config:
    import: configserver:http://localhost:8888
  cloud:
    config:
      uri: http://localhost:8888
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
  kafka:
    enabled: false
