apiVersion: apps/v1
kind: Deployment
metadata:
  name: leafy-profile-service
  namespace: leafy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: profile-service
  template:
    metadata:
      labels:
        app: profile-service
    spec:
      nodeSelector:
        node-type: app
      containers:
        - name: profile-service
          image: 383704034208.dkr.ecr.ap-southeast-1.amazonaws.com/leafy/profile-service:latest
          imagePullPolicy: Always
          env:
            - name: SPRING_CLOUD_CONFIG_URI
              valueFrom:
                configMapKeyRef:
                  name: leafy-common-config
                  key: SPRING_CLOUD_CONFIG_URI
            - name: MONGODB_DATABASE_PROFILE
              valueFrom:
                secretKeyRef:
                  name: leafy-db-secrets
                  key: MONGODB_DATABASE_PROFILE
          envFrom:
            - configMapRef:
                name: leafy-common-config
            - secretRef:
                name: leafy-common-secrets
          ports:
            - containerPort: 8087
              name: http
          resources:
            requests:
              memory: 512Mi
              cpu: 300m
            limits:
              memory: 1536Mi
              cpu: 1000m
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8087
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
