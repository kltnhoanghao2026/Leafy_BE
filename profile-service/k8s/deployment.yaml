apiVersion: apps/v1
kind: Deployment
metadata:
  name: leafy-profile-service
  namespace: leafy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: profile-service
  template:
    metadata:
      labels:
        app: profile-service
    spec:
      nodeSelector:
        node-type: app
      initContainers:
        - name: wait-for-infra
          image: busybox
          command:
            - sh
            - -c
            - |
              # Wait for discovery server (Eureka)
              echo "Waiting for discovery-server..."
              until wget -qO- http://leafy-discovery-server:8761/actuator/health 2>/dev/null | grep -q '"status":"UP"'; do
                sleep 5
              done
              echo "Discovery server is UP"

              # Wait for config server
              echo "Waiting for config-server..."
              until wget -qO- http://leafy-config-server:8888/actuator/health 2>/dev/null | grep -q '"status":"UP"'; do
                sleep 5
              done
              echo "Config server is UP"

              # Wait for MongoDB
              echo "Waiting for MongoDB..."
              until wget -qO- http://leafy-mongodb:27017 2>/dev/null; do
                sleep 5
              done
              echo "MongoDB is UP"

              echo "All infrastructure services are ready!"
      containers:
        - name: profile-service
          image: ${ECR_REGISTRY}/leafy-profile-service:${IMAGE_TAG}
          env:
            - name: IMAGE_TAG
              value: latest
            - name: MONGODB_DATABASE_PROFILE
              valueFrom:
                secretKeyRef:
                  name: leafy-db-secrets
                  key: MONGODB_DATABASE_PROFILE
          envFrom:
            - configMapRef:
                name: leafy-common-config
            - secretRef:
                name: leafy-common-secrets
          ports:
            - containerPort: 8087
              name: http
          resources:
            requests:
              memory: 512Mi
              cpu: 300m
            limits:
              memory: 1536Mi
              cpu: 1000m
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8087
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
