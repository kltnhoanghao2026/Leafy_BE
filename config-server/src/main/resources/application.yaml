spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        health:
          enabled: true

  # Disable Eureka client for config server (it registers itself)
  # Config server should NOT register with Eureka to avoid circular dependency
  eureka:
    client:
      enabled: false

  # Disable Kafka for infrastructure service
  kafka:
    enabled: false

server:
  port: ${SERVER_PORT_CONFIG}

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,busrefresh
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.config: INFO
