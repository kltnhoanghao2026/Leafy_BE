spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        health:
          enabled: true

  # Eureka client configuration
  eureka:
    client:
      enabled: true
      service-url:
        defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    instance:
      prefer-ip-address: true
      lease-renewal-interval-in-seconds: 30
      lease-expiration-duration-in-seconds: 90

  # Disable Kafka for infrastructure service
  kafka:
    enabled: false

server:
  port: ${SERVER_PORT_CONFIG}

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,busrefresh
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.config: INFO
