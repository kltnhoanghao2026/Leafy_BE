server:
  port: ${SERVER_PORT:8085}

spring:
  data:
    mongodb:
      host: ${MONGODB_HOST:localhost}
      port: ${MONGODB_PORT:27017}
      database: ${MONGODB_NOTIFICATION_DATABASE:leafy_notification}
      username: ${MONGODB_USERNAME:admin}
      password: ${MONGODB_PASSWORD:admin123}
      authentication-database: admin

brevo:
  api-key: ${BREVO_API_KEY:your-brevo-api-key-here}
  default-sender-email: ${BREVO_SENDER_EMAIL:noreply@leafy.com}
  default-sender-name: ${BREVO_SENDER_NAME:Leafy Team}
  enabled: ${BREVO_ENABLED:true}

notification:
  email:
    enabled: ${NOTIFICATION_EMAIL_ENABLED:true}
    from: ${NOTIFICATION_EMAIL_FROM:noreply@leafy.com}
  sms:
    enabled: ${NOTIFICATION_SMS_ENABLED:false}
  push:
    enabled: ${NOTIFICATION_PUSH_ENABLED:false}
