server:
  port: ${SERVER_PORT_PROFILE}

spring:
  data:
    mongodb:
      host: ${MONGODB_HOST}
      port: ${MONGODB_PORT}
      database: ${MONGODB_DATABASE_PROFILE}
      username: ${MONGODB_USERNAME}
      password: ${MONGODB_PASSWORD}
      authentication-database: admin

bondhub:
  security:
    gateway-auth:
      enabled: true
