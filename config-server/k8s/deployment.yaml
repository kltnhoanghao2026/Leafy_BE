apiVersion: apps/v1
kind: Deployment
metadata:
  name: leafy-config-server
  namespace: leafy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      nodeSelector:
        node-type: app
      initContainers:
        - name: wait-for-discovery
          image: busybox
          command:
            - sh
            - -c
            - |
              until wget -qO- http://leafy-discovery-server:8761/actuator/health/readiness 2>/dev/null | grep -q '"status":"UP"'; do
                echo "Waiting for discovery-server..."
                sleep 5
              done
              echo "Discovery server is UP"
      containers:
        - name: config-server
          image: 383704034208.dkr.ecr.ap-southeast-1.amazonaws.com/leafy/config-server:latest
          imagePullPolicy: Always
          env:
            - name: SERVER_PORT_CONFIG
              value: "8888"
            - name: HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: leafy-common-config
                  key: HOSTNAME
          envFrom:
            - configMapRef:
                name: leafy-common-config
          ports:
            - containerPort: 8888
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 1024Mi
              cpu: 1000m
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8888
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
