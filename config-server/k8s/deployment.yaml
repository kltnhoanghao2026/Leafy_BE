apiVersion: apps/v1
kind: Deployment
metadata:
  name: leafy-config-server
  namespace: leafy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      nodeSelector:
        node-type: app
      initContainers:
        - name: wait-for-discovery
          image: busybox
          command:
            - sh
            - -c
            - |
              until wget -qO- http://leafy-discovery-server:8761/actuator/health/readiness 2>/dev/null | grep -q '"status":"UP"'; do
                echo "Waiting for discovery-server..."
                sleep 5
              done
              echo "Discovery server is UP"
      containers:
        - name: config-server
          image: ${ECR_REGISTRY}/leafy-config-server:${IMAGE_TAG}
          env:
            - name: IMAGE_TAG
              value: latest
            - name: SERVER_PORT_CONFIG
              value: "8888"
          envFrom:
            - configMapRef:
                name: leafy-common-config
          ports:
            - containerPort: 8888
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 1024Mi
              cpu: 1000m
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
