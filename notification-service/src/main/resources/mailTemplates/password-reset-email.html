<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        color: #333;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
      }
      .header {
        background-color: #ff5722;
        color: white;
        padding: 20px;
        text-align: center;
      }
      .content {
        background-color: #f9f9f9;
        padding: 20px;
      }
      .button {
        background-color: #ff5722;
        color: white;
        padding: 12px 24px;
        text-decoration: none;
        border-radius: 4px;
        display: inline-block;
        margin: 20px 0;
      }
      .footer {
        text-align: center;
        padding: 20px;
        font-size: 12px;
        color: #777;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Password Reset Request</h1>
      </div>
      <div class="content">
        <p>You have requested to reset your password.</p>
        <p>Click the button below to reset your password:</p>
        <p><a href="{{resetLink}}" class="button">Reset Password</a></p>
        <p>If you didn't request this, please ignore this email.</p>
        <p>This link will expire in 24 hours.</p>
        <p>Best regards,<br />The Leafy Team</p>
      </div>
      <div class="footer">
        <p>&copy; 2026 Leafy. All rights reserved.</p>
      </div>
    </div>
  </body>
</html>
