<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        color: #333;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
      }
      .header {
        background-color: #4caf50;
        color: white;
        padding: 20px;
        text-align: center;
      }
      .content {
        background-color: #f9f9f9;
        padding: 20px;
      }
      .footer {
        text-align: center;
        padding: 20px;
        font-size: 12px;
        color: #777;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Welcome to Leafy!</h1>
      </div>
      <div class="content">
        <p>Hello {{name}},</p>
        <p>Thank you for joining Leafy! We're excited to have you on board.</p>
        <p>
          Get started by exploring our features and let us know if you need any
          help.
        </p>
        <p>Best regards,<br />The Leafy Team</p>
      </div>
      <div class="footer">
        <p>&copy; 2026 Leafy. All rights reserved.</p>
      </div>
    </div>
  </body>
</html>
