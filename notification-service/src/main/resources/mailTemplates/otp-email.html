<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        color: #333;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
      }
      .header {
        background-color: #2196f3;
        color: white;
        padding: 20px;
        text-align: center;
      }
      .content {
        background-color: #f9f9f9;
        padding: 20px;
      }
      .otp-box {
        background-color: #2196f3;
        color: white;
        font-size: 32px;
        font-weight: bold;
        padding: 20px;
        text-align: center;
        letter-spacing: 8px;
        margin: 20px 0;
        border-radius: 4px;
      }
      .footer {
        text-align: center;
        padding: 20px;
        font-size: 12px;
        color: #777;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>OTP Verification</h1>
      </div>
      <div class="content">
        <p>Your OTP verification code is:</p>
        <div class="otp-box">{{otp}}</div>
        <p>This code will expire in 10 minutes.</p>
        <p>If you didn't request this code, please ignore this email.</p>
        <p>Best regards,<br />The Leafy Team</p>
      </div>
      <div class="footer">
        <p>&copy; 2026 Leafy. All rights reserved.</p>
      </div>
    </div>
  </body>
</html>
