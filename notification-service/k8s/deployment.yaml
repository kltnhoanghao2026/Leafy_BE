apiVersion: apps/v1
kind: Deployment
metadata:
  name: leafy-notification-service
  namespace: leafy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      nodeSelector:
        node-type: app
      containers:
        - name: notification-service
          image: 383704034208.dkr.ecr.ap-southeast-1.amazonaws.com/leafy/notification-service:latest
          imagePullPolicy: Always
          env:
            - name: MONGODB_DATABASE_NOTIFICATION
              valueFrom:
                secretKeyRef:
                  name: leafy-db-secrets
                  key: MONGODB_DATABASE_NOTIFICATION
            - name: FIREBASE_ENABLED
              value: "true"
            - name: FIREBASE_CONFIG_PATH
              value: /etc/firebase/firebase-service-account.json
          envFrom:
            - configMapRef:
                name: leafy-common-config
            - secretRef:
                name: leafy-common-secrets
          ports:
            - containerPort: 8085
              name: http
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 1536Mi
              cpu: 1000m
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: firebase-credentials
              mountPath: /etc/firebase
              readOnly: true
      volumes:
        - name: firebase-credentials
          secret:
            secretName: leafy-common-secrets
            items:
              - key: FIREBASE_CREDENTIALS_JSON
                path: firebase-service-account.json
