apiVersion: apps/v1
kind: Deployment
metadata:
  name: leafy-plant-management-service
  namespace: leafy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plant-management-service
  template:
    metadata:
      labels:
        app: plant-management-service
    spec:
      nodeSelector:
        node-type: app
      containers:
        - name: plant-management-service
          image: 383704034208.dkr.ecr.ap-southeast-1.amazonaws.com/leafy/plant-management-service:latest
          imagePullPolicy: Always
          env:
            - name: MONGODB_DATABASE_PLANT
              valueFrom:
                secretKeyRef:
                  name: leafy-db-secrets
                  key: MONGODB_DATABASE_PLANT
          envFrom:
            - configMapRef:
                name: leafy-common-config
            - secretRef:
                name: leafy-common-secrets
          ports:
            - containerPort: 8086
              name: http
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 1536Mi
              cpu: 1000m
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
