apiVersion: apps/v1
kind: Deployment
metadata:
  name: leafy-discovery-server
  namespace: leafy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-server
  template:
    metadata:
      labels:
        app: discovery-server
    spec:
      nodeSelector:
        node-type: messaging
      containers:
        - name: discovery-server
          image: 383704034208.dkr.ecr.ap-southeast-1.amazonaws.com/leafy/discovery-server:latest
          ports:
            - containerPort: 8761
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 1024Mi
              cpu: 1000m
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8761
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 5
