apiVersion: apps/v1
kind: Deployment
metadata:
  name: leafy-rag-service
  namespace: leafy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-service
  template:
    metadata:
      labels:
        app: rag-service
    spec:
      nodeSelector:
        node-type: search-ai
      containers:
        - name: rag-service
          image: 383704034208.dkr.ecr.ap-southeast-1.amazonaws.com/leafy/rag-service:latest
          imagePullPolicy: Always
          env:
            - name: MONGODB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: leafy-db-secrets
                  key: MONGODB_DATABASE_RAG
          envFrom:
            - configMapRef:
                name: leafy-common-config
            - configMapRef:
                name: rag-config
            - secretRef:
                name: leafy-common-secrets
          ports:
            - containerPort: 8199
          resources:
            requests:
              memory: 1024Mi
              cpu: 500m
            limits:
              memory: 4096Mi
              cpu: 2000m
          readinessProbe:
            httpGet:
              path: /health
              port: 8199
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8199
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
