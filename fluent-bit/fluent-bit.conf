[SERVICE]
    Flush                    5
    Log_Level                info
    HTTP_Server              On
    HTTP_Port                2020
    Health_Check             On

[INPUT]
    Name                    tail
    Path                    /var/log/containers/*.log
    Parser                  datalog
    Tag                     kube.*
    Refresh_Interval        5
    DB                      /var/log/flb_kube.db
    DB.Sync                 normal
    Mem_Buf_Limit           50MB
    Skip_Long_Lines         On

[INPUT]
    Name                    tail
    Path                    /var/log/host/*.log
    Parser                  datalog
    Tag                     host.*
    Refresh_Interval        5
    Skip_Long_Lines         On

[FILTER]
    Name                    parser
    Match                   kube.*
    Key_Name                log
    Parser                  datalog
    Reserve_Data            On

[FILTER]
    Name                    kubernetes
    Match                   kube.*
    Kube_URL                https://kubernetes.default.svc:443
    Kube_CA_File            /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    Kube_Token_File         /var/run/secrets/kubernetes.io/serviceaccount/token
    Kube_Tag_Prefix         kube.var.log.containers.
    Merge_Log               On
    Merge_Log_Key           log_processed
    K8S-Logging.Parser      On
    K8S-Logging.Exclude     On
    Labels                  On
    Annotations             Off
    Use_Journal             Off

[OUTPUT]
    Name                    elasticsearch
    Match                   kube.*
    Host                    elasticsearch
    Port                    9200
    Logstash_Format         On
    Logstash_Prefix         logs
    Logstash_DateFormat     %Y.%m.%d
    Time_Key                @timestamp
    Retry_Limit             False
    Suppress_Type_Name      On
    Replace_Dots            On
    Generate_Hash           On
    Hash_Key_Name           _hash
    compress                gzip
    TLS                     Off
    TLS.verify              Off

[OUTPUT]
    Name                    stdout
    Match                   kube.*
    Format                  json_lines
