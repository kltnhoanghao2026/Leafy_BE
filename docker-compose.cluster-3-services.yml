# ===========================================
# CLUSTER 3: Business Services
# EC2 Instance: ec2-services (Application Services)
# ===========================================
# Services: Plant, Search, Notification, Socket, Message, Community, Profile, File
# Ports exposed: 8084-8095

services:
  # ===========================================
  # BUSINESS SERVICES
  # ===========================================

  # Plant Management Service
  plant-management-service:
    image: ${DOCKER_REGISTRY:-leafy-registry}/plant-management-service:${IMAGE_TAG:-latest}
    container_name: plant-management-service
    hostname: plant-management-service
    restart: unless-stopped
    environment:
      SERVER_PORT_PLANT: ${SERVER_PORT_PLANT:-8085}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://discovery-server:8761/eureka/}
      HOSTNAME: plant-management-service
      MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      MONGODB_PORT: 27017
      MONGODB_DATABASE_PLANT: leafy_plant
      MONGODB_USERNAME: admin
      MONGODB_PASSWORD: admin123
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_HOST:-kafka}:29092
    ports:
      - "${SERVER_PORT_PLANT:-8085}:8085"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8085/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # Search Service
  search-service:
    image: ${DOCKER_REGISTRY:-leafy-registry}/search-service:${IMAGE_TAG:-latest}
    container_name: search-service
    hostname: search-service
    restart: unless-stopped
    environment:
      SERVER_PORT_SEARCH: ${SERVER_PORT_SEARCH:-8088}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://discovery-server:8761/eureka/}
      HOSTNAME: search-service
      MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      MONGODB_PORT: 27017
      MONGODB_DATABASE_SEARCH: leafy_search
      MONGODB_USERNAME: admin
      MONGODB_PASSWORD: admin123
      ELASTICSEARCH_URIS: http://${ELASTICSEARCH_HOST:-elasticsearch}:9200
      ELASTICSEARCH_URL: http://${ELASTICSEARCH_HOST:-elasticsearch}:9200
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_HOST:-kafka}:29092
    ports:
      - "${SERVER_PORT_SEARCH:-8088}:8088"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8088/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # Notification Service
  notification-service:
    image: ${DOCKER_REGISTRY:-leafy-registry}/notification-service:${IMAGE_TAG:-latest}
    container_name: notification-service
    hostname: notification-service
    restart: unless-stopped
    environment:
      SERVER_PORT_NOTIFICATION: ${SERVER_PORT_NOTIFICATION:-8095}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://discovery-server:8761/eureka/}
      HOSTNAME: notification-service
      MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      MONGODB_PORT: 27017
      MONGODB_DATABASE_NOTIFICATION: leafy_notification
      MONGODB_USERNAME: admin
      MONGODB_PASSWORD: admin123
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: redis123
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_HOST:-kafka}:29092
      FIREBASE_CONFIG_PATH: /run/secrets/firebase-service-account.json
      NOTIFICATION_EMAIL_ENABLED: ${NOTIFICATION_EMAIL_ENABLED}
      NOTIFICATION_EMAIL_FROM: ${NOTIFICATION_EMAIL_FROM}
      NOTIFICATION_SMS_ENABLED: ${NOTIFICATION_SMS_ENABLED}
      NOTIFICATION_PUSH_ENABLED: ${NOTIFICATION_PUSH_ENABLED}
    ports:
      - "${SERVER_PORT_NOTIFICATION:-8095}:8095"
    volumes:
      - ./secrets/your-file.json:/run/secrets/firebase-service-account.json:ro
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8095/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # Socket Service
  socket-service:
    image: ${DOCKER_REGISTRY:-leafy-registry}/socket-service:${IMAGE_TAG:-latest}
    container_name: socket-service
    hostname: socket-service
    restart: unless-stopped
    environment:
      SERVER_PORT_SOCKET: ${SERVER_PORT_SOCKET:-8093}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://discovery-server:8761/eureka/}
      HOSTNAME: socket-service
      MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      MONGODB_PORT: 27017
      MONGODB_DATABASE_SOCKET: leafy_socket
      MONGODB_USERNAME: admin
      MONGODB_PASSWORD: admin123
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_HOST:-kafka}:29092
    ports:
      - "${SERVER_PORT_SOCKET:-8093}:8093"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8093/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # Message Service
  message-service:
    image: ${DOCKER_REGISTRY:-leafy-registry}/message-service:${IMAGE_TAG:-latest}
    container_name: message-service
    hostname: message-service
    restart: unless-stopped
    environment:
      SERVER_PORT_MESSAGES: ${SERVER_PORT_MESSAGES:-8092}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://discovery-server:8761/eureka/}
      HOSTNAME: message-service
      MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      MONGODB_PORT: 27017
      MONGODB_DATABASE_MESSAGES: leafy_message
      MONGODB_USERNAME: admin
      MONGODB_PASSWORD: admin123
    ports:
      - "${SERVER_PORT_MESSAGES:-8092}:8092"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8092/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # Community Feed Service
  community-feed-service:
    image: ${DOCKER_REGISTRY:-leafy-registry}/community-feed-service:${IMAGE_TAG:-latest}
    container_name: community-feed-service
    hostname: community-feed-service
    restart: unless-stopped
