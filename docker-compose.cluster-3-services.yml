      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://discovery-server:8761/eureka/}
      HOSTNAME: community-feed-service
      MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      MONGODB_PORT: 27017
      MONGODB_DATABASE_COMMUNITY_FEED: leafy_community
      MONGODB_USERNAME: admin
      MONGODB_PASSWORD: admin123
    ports:
      - "${SERVER_PORT_COMMUNITY_FEED:-8090}:8090"
    networks:
      - leafy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8090/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # Profile Service
  profile-service:
    image: ${DOCKER_REGISTRY:-leafy-registry}/profile-service:${IMAGE_TAG:-latest}
    container_name: profile-service
    hostname: profile-service
    restart: unless-stopped
    environment:
      SERVER_PORT_PROFILE: ${SERVER_PORT_PROFILE:-8086}
      SPRING_CONFIG_IMPORT: configserver:${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      SPRING_CLOUD_CONFIG_URI: ${SPRING_CLOUD_CONFIG_URI:-http://config-server:8888}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://discovery-server:8761/eureka/}
      HOSTNAME: profile-service
      MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      MONGODB_PORT: 27017
      MONGODB_DATABASE_PROFILE: leafy_profile
