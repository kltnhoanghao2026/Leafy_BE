spring:
  application:
    name: community-feed-service
  config:
    import: configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
  cloud:
    config:
      uri: ${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
      fail-fast: false
      retry:
        max-attempts: 10
        initial-interval: 1000
        max-interval: 10000
        multiplier: 2.0
      request-connect-timeout: 5000
      request-read-timeout: 10000

community-feed:
  seeder:
    post-count: 100
    comment-count: 400
    vote-count: 700
    profile-page-size: 200
    profile-max-pages: 3
    random-seed: 20260324
